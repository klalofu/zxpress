<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Unreal Speccy Web</title>
    <style>
        body { background: #111; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #888; font-family: monospace; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #000; max-width: 100%; max-height: 90vh; }
        #status { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status">Инициализация...</div>
    <canvas id="canvas"></canvas>


<script>
    var Module = {
        canvas: document.getElementById('canvas'),

        onReady: function() {
            console.log("Эмулятор готов!");
        },

        locateFile: function(filename) {
            return filename;
        },

        onRuntimeInitialized: function() {
            document.getElementById('status').innerText = "Эмулятор готов!";
        },

        preRun: [
            function() {
                const params = new URLSearchParams(window.location.search);
                const gameName = params.get('game');

                if (gameName) {
                    document.getElementById('status').innerText = "Загрузка " + gameName + "...";

                    // 1. Говорим эмулятору: "Стоп, не запускай main(), пока я не скажу"
                    Module.addRunDependency('game-download');

                    var gameUrl = 'games/' + gameName;

                    var xhr = new XMLHttpRequest();
                    xhr.open('GET', gameUrl, true);
                    xhr.responseType = 'arraybuffer';

                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            var data = new Uint8Array(xhr.response);

                            // Создаем файл в корне файловой системы
                            Module.FS_createDataFile('/', gameName, data, true, true, true);

                            // Передаем аргументы (как будто запустили: usp game.trd)
                            Module.arguments = [gameName];

                            document.getElementById('status').innerText = "Файл получен, запуск эмулятора...";

                            // 2. Говорим эмулятору: "Всё, можно запускаться!"
                            Module.removeRunDependency('game-download');
                        } else {
                            document.getElementById('status').innerText = "Ошибка 404: Файл не найден.";
                            // Если ошибка, тоже снимаем блокировку, иначе эмулятор зависнет навсегда
                            Module.removeRunDependency('game-download');
                        }
                    };

                    xhr.onerror = function() {
                        document.getElementById('status').innerText = "Ошибка сети.";
                        Module.removeRunDependency('game-download');
                    };

                    xhr.send(null);
                } else {
                    // Если игры нет, снимаем блокировку сразу, чтобы эмулятор просто запустился
                    document.getElementById('status').innerText = "Игра не выбрана. Жду...";
                }
            }
        ]
    };
</script>

<script src="unreal_speccy_portable.js"></script>

</body
</html
