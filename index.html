<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZX Spectrum Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Статус загрузки -->
    <div id="status">Подготовка...</div>

    <!-- Оверлей "Нажми, чтобы стартовать" -->
    <div id="start-overlay">
        <div id="start-btn">▶ ЗАПУСТИТЬ</div>
    </div>

    <!-- Экран эмулятора -->
    <canvas id="canvas"></canvas>

        <div id="vk-container">
        <div class="first-row">
            <div class="vk-btn vk-skin-btn" data-key="1">
                Q
            </div>
            <div class="vk-btn vk-skin-btn " data-key="2">
                W
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="3">
                E
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="4">
                R
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="5">
                T
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="6">
                Y
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="7">
                U
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="8">
                I
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="9">
                O
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="0">
                P
            </div>
        </div>
        <div class="second-row">
            <div class="vk-btn vk-skin-btn" data-key="q">
                Q
            </div>
            <div class="vk-btn vk-skin-btn" data-key="w">
                W
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="e">
                E
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="r">
                R
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="t">
                T
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="y">
                Y
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="u">
                U
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="i">
                I
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="o">
                O
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="p">
                P
            </div>
        </div>
        <div class="third-row">
            <div class="vk-btn vk-skin-btn " data-key="a">
                Q
            </div>
            <div class="vk-btn vk-skin-btn " data-key="s">
                W
            </div>        
            <div class="vk-btn vk-skin-btn " 
                data-key="d">
                E
            </div>        
            <div class="vk-btn vk-skin-btn " 
                data-key="f">
                R
            </div>        
            <div class="vk-btn vk-skin-btn " 
                data-key="g">
                T
            </div>        
            <div class="vk-btn vk-skin-btn " 
                data-key="h">
                Y
            </div>        
            <div class="vk-btn vk-skin-btn " 
                data-key="j">
                U
            </div>
            <div class="vk-btn vk-skin-btn " 
                data-key="k">
                I
            </div>
            <div class="vk-btn vk-skin-btn " 
                data-key="l">
                O
            </div>
            <div class="vk-btn vk-skin-btn " 
                data-key="Enter">
                P
            </div>
        </div>

        <div class="fourth-row">
            <div class="vk-btn vk-skin-btn" 
                data-key="CAPSSHIFT">
                O
            </div>
            <div class="vk-btn vk-skin-btn" data-key="z">
                Q
            </div>
            <div class="vk-btn vk-skin-btn" data-key="x">
                W
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="c">
                E
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="v">
                R
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="b">
                T
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="n">
                Y
            </div>        
            <div class="vk-btn vk-skin-btn" 
                data-key="m">
                U
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="SYMSHIFT">
                O
            </div>
            <div class="vk-btn vk-skin-btn" 
                data-key="SPACE">
                P
            </div>
        </div>
    

        
        <!-- Кнопка Reset (обычно где-то справа или внизу) -->
        <div class="vk-btn vk-skin-btn" id="btn-reset"
             style="top: 5%; left: 85%; width: 10%; height: 8%;">
             RST
        </div>
    </div>
        <!-- Подключение скриптов. ВАЖЕН ПОРЯДОК! -->
    <!-- 1. Сначала наш скрипт (настраивает Module и preRun) -->
    <script src="script.js"></script>
    <!-- 2. Потом сам эмулятор (считывает настройки и запускается) -->
    <script src="unreal_speccy_portable.js"></script>

</body>
</html>
