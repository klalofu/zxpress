<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZX Web Emulator</title>
    <style>
        body { 
            background: #111; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        
        canvas { 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            background: #000; 
            max-width: 100%; 
            max-height: 90vh; 
        }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
        }

        #start-btn {
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 5px;
            background: transparent;
        }
        #start-btn:hover { background: #fff; color: #000; }
        
        #status { margin-bottom: 10px; pointer-events: none; z-index: 10;}
    </style>
</head>
<body>

    <div id="status">Подготовка...</div>

    <div id="start-overlay">
        <div id="start-btn">▶ ЗАПУСТИТЬ ИГРУ</div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        var Module = {
            canvas: document.getElementById('canvas'),

            onReady: function() {
                console.log("USP: onReady");
            },

            locateFile: function(filename) {
                return filename;
            },

            onRuntimeInitialized: function() {
                document.getElementById('status').innerText = "Готов. Жмите кнопку.";
            },

            preRun: [
                function() {
                    const params = new URLSearchParams(window.location.search);
                    let gameName = params.get('game');

                    if (gameName) {
                        gameName = gameName.toLowerCase();
                        document.getElementById('status').innerText = "Загрузка " + gameName + "...";

                        Module.addRunDependency('game-download');

                        // Если игры в папке games:
                        var gameUrl = 'games/' + gameName;
                        

                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', gameUrl, true);
                        xhr.responseType = 'arraybuffer';

                        xhr.onload = function() {
                            if (xhr.status === 200) {
                                var data = new Uint8Array(xhr.response);
                                
                                // Создаем файл
                                Module.FS_createDataFile('/', gameName, data, true, true, true);

                                // Передаем аргументы (пробуем с точкой, может быть важно для некоторых сборок)
                                Module.arguments = ['./' + gameName];

                                console.log("Файл: " + gameName + " загружен. Аргументы:", Module.arguments);
                                
                                document.getElementById('status').innerText = "Игра в памяти. Запуск...";
                                Module.removeRunDependency('game-download');
                            } else {
                                document.getElementById('status').innerText = "Ошибка 404";
                                Module.removeRunDependency('game-download');
                            }
                        };
                        xhr.onerror = function() {
                            document.getElementById('status').innerText = "Ошибка сети";
                            Module.removeRunDependency('game-download');
                        };
                        xhr.send(null);
                    } else {
                        console.log("Игра не указана");
                        Module.arguments = [];
                    }
                }
            ]
        };

        // Функция для эмуляции нажатия клавиши F5 (Reset)
        function pressF5() {
            var canvas = Module.canvas;
            var code = 116; // KeyCode для F5

            var evtDown = new KeyboardEvent("keydown", {
                bubbles: true, cancelable: true, keyCode: code, which: code, key: "F5"
            });
            var evtUp = new KeyboardEvent("keyup", {
                bubbles: true, cancelable: true, keyCode: code, which: code, key: "F5"
            });
            
            canvas.dispatchEvent(evtDown);
            setTimeout(() => canvas.dispatchEvent(evtUp), 50);
            console.log("Нажата клавиша F5 (Reset)");
        }

        var overlay = document.getElementById('start-overlay');
        
        overlay.addEventListener('click', function() {
            overlay.style.display = 'none';
            document.getElementById('status').style.display = 'none';

            // Размораживаем звук (на всякий случай)
            if (Module.SDL2 && Module.SDL2.audioContext && Module.SDL2.audioContext.state === 'suspended') {
                Module.SDL2.audioContext.resume();
            }

            Module.canvas.focus();
            Module.canvas.setAttribute('tabindex', '1');

            // !!! САМОЕ ГЛАВНОЕ: Ждем 500мс и нажимаем F5
            setTimeout(pressF5, 500);
        });
    </script>

    <script src="unreal_speccy_portable.js"></script>

</body>
</html>
