<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Unreal Speccy Web</title>
    <style>
        body { background: #111; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #888; font-family: monospace; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #000; max-width: 100%; max-height: 90vh; }
        #status { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="status">Инициализация...</div>
    <canvas id="canvas"></canvas>
<script>
    var Module = {
        canvas: document.getElementById('canvas'),

        onReady: function() {
            console.log("Эмулятор готов (onReady)!");
        },

        locateFile: function(filename) {
            return filename;
        },

        onRuntimeInitialized: function() {
            document.getElementById('status').innerText = "Эмулятор готов!";
            console.log("Runtime инициализирован");
        },

        preRun: [
            function() {
                const params = new URLSearchParams(window.location.search);
                let gameName = params.get('game');

                if (gameName) {
                    // Приводим имя файла к нижнему регистру, чтобы избежать проблем с Linux
                    // (spectrofon1.TRD -> spectrofon1.trd)
                    gameName = gameName.toLowerCase();

                    document.getElementById('status').innerText = "Загрузка " + gameName + "...";

                    // Ставим на паузу запуск C++ кода
                    Module.addRunDependency('game-download');

                    var gameUrl = 'games/' + gameName;

                    var xhr = new XMLHttpRequest();
                    xhr.open('GET', gameUrl, true);
                    xhr.responseType = 'arraybuffer';

                    xhr.onload = function() {
                        if (xhr.status === 200) {
                            var data = new Uint8Array(xhr.response);

                            // Создаем файл в памяти эмулятора
                            // Важно: используем gameName (маленькими буквами)
                            Module.FS_createDataFile('/', gameName, data, true, true, true);

                            // Передаем аргумент запуска эмулятору
                            Module.arguments = ['/' + gameName];

                            console.log("Файл создан, аргументы запуска:", Module.arguments);
                            
                            document.getElementById('status').innerText = "Игра загружена, запуск...";
                            
                            // Снимаем паузу, эмулятор запускается
                            Module.removeRunDependency('game-download');
                        } else {
                            document.getElementById('status').innerText = "Ошибка 404: Файл '" + gameName + "' не найден на сервере.";
                            console.error("Не удалось скачать файл", xhr.status);
                            Module.removeRunDependency('game-download');
                        }
                    };

                    xhr.onerror = function() {
                        document.getElementById('status').innerText = "Ошибка сети.";
                        console.error("Ошибка сети");
                        Module.removeRunDependency('game-download');
                    };

                    xhr.send(null);
                } else {
                    console.log("Игра не выбрана (нет параметра ?game=)");
                    Module.arguments = [];
                }
            }
        ]
    };
</script>

<script src="unreal_speccy_portable.js"></script>
</body
</html
