<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZX Web Emulator</title>
    <style>
        body { 
            background: #111; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        canvas { 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
            background: #000; 
            max-width: 100%; 
            max-height: 90vh; 
        }
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
        }
        #start-btn {
            border: 2px solid #fff;
            color: #fff;
            padding: 15px 30px;
            font-size: 24px;
            border-radius: 5px;
            background: transparent;
        }
        #start-btn:hover { background: #fff; color: #000; }
        #status { margin-bottom: 10px; pointer-events: none; z-index: 10;}
        #vk-container {
            width: 100%;
            max-width: 640px;
            background: #222;
            padding: 5px;
            padding-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            user-select: none; /* Запрет выделения текста */
            touch-action: manipulation; /* Запрет зума */
            box-sizing: border-box;
        }

        .vk-btn {
            background: #444;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 12px 0;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 2px 0 #000;
        }

        .vk-btn:active, .vk-btn.active {
            background: #666;
            box-shadow: 0 0 0 #000;
            transform: translateY(2px);
        }

        /* Специальные цвета для модификаторов */
        .vk-mod-cs { background: #533; border-color: #644; } /* Caps Shift */
        .vk-mod-ss { background: #335; border-color: #446; } /* Symbol Shift */
        .vk-mod-f5 { background: #353; border-color: #464; grid-column: span 2;} /* Reset */
</style>
</head>
<body>

    <div id="status">Подготовка...</div>

    <div id="start-overlay">
        <div id="start-btn">▶ ЗАПУСТИТЬ ИГРУ</div>
    </div>

    <canvas id="canvas"></canvas>
    <!-- Виртуальная клавиатура -->
    <div id="vk-container">
        <!-- Ряд 1: Цифры и Backspace -->
        <div class="vk-btn" data-key="1">1</div>
        <div class="vk-btn" data-key="2">2</div>
        <div class="vk-btn" data-key="3">3</div>
        <div class="vk-btn" data-key="4">4</div>
        <div class="vk-btn" data-key="5">5</div>
        <div class="vk-btn" data-key="6">6</div>
        <div class="vk-btn" data-key="7">7</div>
        <div class="vk-btn" data-key="8">8</div>
        <div class="vk-btn" data-key="9">9</div>
        <div class="vk-btn" data-key="0">0</div>
        <!-- Backspace на отдельной строке или 11-й кнопкой, пока оставим просто -->

        <!-- Ряд 2: Q-P -->
        <div class="vk-btn" data-key="q">Q</div>
        <div class="vk-btn" data-key="w">W</div>
        <div class="vk-btn" data-key="e">E</div>
        <div class="vk-btn" data-key="r">R</div>
        <div class="vk-btn" data-key="t">T</div>
        <div class="vk-btn" data-key="y">Y</div>
        <div class="vk-btn" data-key="u">U</div>
        <div class="vk-btn" data-key="i">I</div>
        <div class="vk-btn" data-key="o">O</div>
        <div class="vk-btn" data-key="p">P</div>

        <!-- Ряд 3: A-L + Enter + CS -->
        <div class="vk-btn vk-mod-cs" data-key="ShiftLeft" id="btn-cs">CS</div>
        <div class="vk-btn" data-key="a">A</div>
        <div class="vk-btn" data-key="s">S</div>
        <div class="vk-btn" data-key="d">D</div>
        <div class="vk-btn" data-key="f">F</div>
        <div class="vk-btn" data-key="g">G</div>
        <div class="vk-btn" data-key="h">H</div>
        <div class="vk-btn" data-key="j">J</div>
        <div class="vk-btn" data-key="k">K</div>
        <div class="vk-btn" data-key="l">L</div>
        <div class="vk-btn" data-key="Enter">ENT</div>

        <!-- Ряд 4: Z-M + Space + SS -->
        <div class="vk-btn vk-mod-ss" data-key="AltLeft" id="btn-ss">SS</div>
        <div class="vk-btn" data-key="z">Z</div>
        <div class="vk-btn" data-key="x">X</div>
        <div class="vk-btn" data-key="c">C</div>
        <div class="vk-btn" data-key="v">V</div>
        <div class="vk-btn" data-key="b">B</div>
        <div class="vk-btn" data-key="n">N</div>
        <div class="vk-btn" data-key="m">M</div>
        <div class="vk-btn" data-key="." style="grid-column: span 2">.</div>

        <!-- Кнопка сброса (удобно на мобилке) -->
        <div class="vk-btn vk-mod-f5" id="btn-reset">RESET (F5)</div>
    </div>
    <!-- ШАГ 1: Настраиваем Module ДО загрузки скрипта эмулятора -->
    <script>
        var Module = {
            canvas: document.getElementById('canvas'),
            onReady: function() {
                console.log("USP Ready");
            },
            locateFile: function(filename) {
                return filename;
            }
        };

        // Сразу читаем URL и передаем аргументы
        const params = new URLSearchParams(window.location.search);
        let gameName = params.get('game');

        if (gameName) {
            gameName = gameName.toLowerCase();
            console.log("Игра из URL:", gameName);
            
            // !!! ВАЖНО: Задаем аргументы СРАЗУ ЖЕ. 
            // Эмулятор прочитает их, когда скрипт загрузится ниже.
            // Используем относительный путь ./ , так как USP на это рассчитывает
            Module.arguments = ['./' + gameName];

                // --- Логика виртуальной клавиатуры ---
    // --- Логика виртуальной клавиатуры ---

    // Функция для правильного маппинга клавиш (a -> KeyA)
    function getKeyCode(char) {
        if (char.length === 1) {
            if (char >= '0' && char <= '9') return 'Digit' + char;
            if (char >= 'a' && char <= 'z') return 'Key' + char.toUpperCase();
            if (char >= 'A' && char <= 'Z') return 'Key' + char;
            if (char === '.') return 'Period';
            if (char === ',') return 'Comma';
            if (char === '-') return 'Minus';
            if (char === '=') return 'Equal';
        }
        // Специальные клавиши
        if (char === 'Enter') return 'Enter';
        if (char === 'ShiftLeft') return 'ShiftLeft';
        if (char === 'AltLeft') return 'AltLeft';
        return char;
    }

    function sendKey(keyCode, type) {
        if (!Module || !Module.canvas) return;

        // ГАВНО: Возвращаем фокус канвасу, чтобы эмулятор "услышал" событие
        Module.canvas.focus();

        var code = getKeyCode(keyCode);
        
        var eventInit = {
            bubbles: true, 
            cancelable: true, 
            key: keyCode, 
            code: code,
            keyCode: keyCode.length === 1 ? keyCode.toUpperCase().charCodeAt(0) : 0, // Для совместимости
            which: keyCode.length === 1 ? keyCode.toUpperCase().charCodeAt(0) : 0,
            shiftKey: activeModifiers.shift,
            altKey: activeModifiers.sym
        };

        var event;
        if (type === 'down') {
            event = new KeyboardEvent("keydown", eventInit);
        } else if (type === 'up') {
            event = new KeyboardEvent("keyup", eventInit);
        }

        // Отправляем событие в window, чтобы его поймал глобальный слушатель SDL
        window.dispatchEvent(event);
    }

    var buttons = document.querySelectorAll('.vk-btn');
    
    buttons.forEach(function(btn) {
        var key = btn.getAttribute('data-key');
        var isModifier = (key === 'ShiftLeft' || key === 'AltLeft');

        var pressHandler = function(e) {
            e.preventDefault(); 
            
            if (isModifier) {
                if (key === 'ShiftLeft') {
                    activeModifiers.shift = !activeModifiers.shift;
                    btn.classList.toggle('active', activeModifiers.shift);
                    sendKey('ShiftLeft', activeModifiers.shift ? 'down' : 'up');
                } else if (key === 'AltLeft') {
                    activeModifiers.sym = !activeModifiers.sym;
                    btn.classList.toggle('active', activeModifiers.sym);
                    sendKey('AltLeft', activeModifiers.sym ? 'down' : 'up');
                }
            } else {
                btn.classList.add('active');
                sendKey(key, 'down');
            }
        };

        var releaseHandler = function(e) {
            e.preventDefault();
            if (!isModifier) {
                btn.classList.remove('active');
                sendKey(key, 'up');
            }
        };

        // Для поддержки и мышки, и тача
        btn.addEventListener('mousedown', pressHandler);
        btn.addEventListener('touchstart', pressHandler, {passive: false});

        btn.addEventListener('mouseup', releaseHandler);
        btn.addEventListener('touchend', releaseHandler);
        btn.addEventListener('mouseleave', releaseHandler);
    });

    // Кнопка Reset
    document.getElementById('btn-reset').addEventListener('click', function() {
        Module.canvas.focus();
        sendKey('F5', 'down');
        setTimeout(function() { sendKey('F5', 'up'); }, 50);
    });
        } else {
            Module.arguments = [];
        }
    </script>

    <!-- ШАГ 2: Загружаем эмулятор. 
         Он сейчас прочитает Module.arguments и запомнит их. -->
    <script src="unreal_speccy_portable.js"></script>

    <!-- ШАГ 3: Добавляем логику скачивания файла в preRun -->
    <script>
        if (gameName) {
            // Добавляем нашу функцию в массив preRun
            // Эмулятор выполнит её перед запуском main()
            Module.preRun.push(function() {
                console.log("PreRun: Начинаю скачивание файла...");

                // Останавливаем запуск, пока файл не скачается
                Module.addRunDependency('game-download');

                // Путь к файлу (если в папке games - добавьте префикс)
                var gameUrl = 'games/' + gameName;

                var xhr = new XMLHttpRequest();
                xhr.open('GET', gameUrl, true);
                xhr.responseType = 'arraybuffer';

                xhr.onload = function() {
                    if (xhr.status === 200) {
                        var data = new Uint8Array(xhr.response);
                        
                        // Создаем файл в корневой директории
                        Module.FS_createDataFile('/', gameName, data, true, true, true);
                        
                        console.log("PreRun: Файл успешно создан в FS");
                        
                        // Снимаем блокировку. Эмулятор запустится.
                        Module.removeRunDependency('game-download');
                    } else {
                        console.error("PreRun: Ошибка 404");
                        // Чтобы не зависнуть, снимаем блокировку и при этом очистим аргументы, чтобы не было краша
                        Module.arguments = []; 
                        Module.removeRunDependency('game-download');
                    }
                };

                xhr.onerror = function() {
                    console.error("PreRun: Ошибка сети");
                    Module.arguments = [];
                    Module.removeRunDependency('game-download');
                };

                xhr.send(null);
            });
        }

        // Обработчик кнопки для звука
        var overlay = document.getElementById('start-overlay');
        overlay.addEventListener('click', function() {
            overlay.style.display = 'none';
            document.getElementById('status').style.display = 'none';

            // Разморозка аудио
            if (Module.SDL2 && Module.SDL2.audioContext && Module.SDL2.audioContext.state === 'suspended') {
                Module.SDL2.audioContext.resume();
            }

            Module.canvas.focus();
            
            // Автоматический Reset (F5) через 0.5 сек, если USP не перезагрузился сам
            // (Иногда требуется, чтобы TR-DOS сработал)
            setTimeout(function() {
                var code = 116; // F5
                var evtDown = new KeyboardEvent("keydown", { bubbles: true, keyCode: code, which: code, key: "F5" });
                var evtUp = new KeyboardEvent("keyup", { bubbles: true, keyCode: code, which: code, key: "F5" });
                Module.canvas.dispatchEvent(evtDown);
                setTimeout(() => Module.canvas.dispatchEvent(evtUp), 50);
            }, 500);
        });
    </script>

</body>
</html>
